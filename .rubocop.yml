AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  # ActiveSupport::Concern's `class_methods do ... end` is a method-definition
  # container, not a logic block, so it should not be length-capped.
  AllowedMethods:
    - class_methods
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    - "Rakefile"

Metrics/MethodLength:
  Max: 20

Layout/LineLength:
  Max: 110

# ActiveSupport::Concern's `class_methods do ... end` block is a visibility
# context, so `private` inside it is meaningful.
Lint/UselessAccessModifier:
  ContextCreatingMethods:
    - class_methods
